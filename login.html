<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - YussXy Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #0f0f0f;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
        }

        .login-card {
            background: #1e1e1e;
            border-radius: 40px;
            padding: 40px 28px;
            max-width: 360px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a2a2a;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .logo-img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 12px;
            border: 2px solid #ef4444;
        }

        .login-card h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .login-card h2 span {
            color: #ef4444;
        }

        .subtitle {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 28px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #9ca3af;
        }

        .login-input {
            width: 100%;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 60px;
            color: white;
            font-size: 14px;
        }

        .login-input:focus {
            outline: none;
            border-color: #ef4444;
        }

        .login-input.error {
            border-color: #ef4444;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #ef4444, #dc2626);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .login-btn.guest {
            background: transparent;
            border: 1px solid #3a3a3a;
            margin-bottom: 0;
        }

        .login-note {
            font-size: 10px;
            color: #9ca3af;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #ef4444;
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 12px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <img src="image/logo/logo.jpg" alt="Logo" class="logo-img" onerror="this.src='https://placehold.co/70x70/ef4444/white?text=Y'">
            <h2>YussXy<span>Store</span></h2>
            <p class="subtitle">Selamat datang</p>
            
            <div class="input-group">
                <label><i class="ri-user-line"></i> Nama Panggilan</label>
                <input type="text" id="loginName" class="login-input" placeholder="Masukkan nama" maxlength="25" autocomplete="off">
            </div>
            
            <button class="login-btn" id="loginStartBtn">
                <i class="ri-login-box-line"></i> Mulai
            </button>
            <button class="login-btn guest" id="loginGuestBtn">
                <i class="ri-user-smile-line"></i> Guest
            </button>
            
            <p class="login-note">
                <i class="ri-information-line"></i> Data disimpan lokal
            </p>
        </div>
    </div>

    <script>
        (function() {
            // Cek login SEBELUM apapun
            if (localStorage.getItem('app_user')) {
                window.location.href = 'index.html';
                return;
            }
            
            const loginName = document.getElementById('loginName');
            const loginBtn = document.getElementById('loginStartBtn');
            const guestBtn = document.getElementById('loginGuestBtn');
            
            function showToast(message) {
                const oldToast = document.querySelector('.toast-message');
                if (oldToast) oldToast.remove();
                
                const toast = document.createElement('div');
                toast.className = 'toast-message';
                toast.innerHTML = '<i class="ri-information-line"></i> ' + message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            }
            
            function showError() {
                loginName.classList.add('error');
                setTimeout(() => loginName.classList.remove('error'), 300);
            }
            
            function saveUser(name, isGuest) {
                const user = {
                    name: name.trim(),
                    isGuest: isGuest,
                    loginTime: Date.now()
                };
                localStorage.setItem('app_user', JSON.stringify(user));
                window.location.href = 'index.html';
            }
            
            loginBtn.addEventListener('click', function() {
                const name = loginName.value.trim();
                if (!name) {
                    showToast('Masukkan nama');
                    showError();
                    loginName.focus();
                    return;
                }
                if (name.length < 3) {
                    showToast('Minimal 3 karakter');
                    showError();
                    loginName.focus();
                    return;
                }
                saveUser(name, false);
            });
            
            guestBtn.addEventListener('click', function() {
                saveUser('Guest', true);
            });
            
            loginName.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const name = loginName.value.trim();
                    if (name && name.length >= 3) {
                        saveUser(name, false);
                    } else if (name && name.length < 3) {
                        showToast('Minimal 3 karakter');
                        showError();
                    } else {
                        showToast('Masukkan nama');
                        showError();
                    }
                }
            });
            
            loginName.focus();
        })();
    </script>
</body>
</html>
