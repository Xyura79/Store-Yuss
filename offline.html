<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Offline - YussXy Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        body {
            background: #0f0f0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .offline-container {
            text-align: center;
            max-width: 320px;
        }
        .offline-icon i {
            font-size: 80px;
            color: #ef4444;
            margin-bottom: 20px;
            display: block;
        }
        .offline-container h2 {
            font-size: 24px;
            margin-bottom: 12px;
        }
        .offline-container p {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .offline-btn {
            background: linear-gradient(90deg, #ef4444, #dc2626);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .offline-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="ri-wifi-off-line"></i>
        </div>
        <h2>Tidak Ada Koneksi</h2>
        <p>YussXy Store membutuhkan koneksi internet untuk mengakses konten terbaru.</p>
        <button class="offline-btn" onclick="location.reload()">
            <i class="ri-refresh-line"></i> Coba Lagi
        </button>
    </div>
</body>
</html>
