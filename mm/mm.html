<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YussXy Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="mm.css">
</head>
<body>
    <div class="app-container">
        <div class="top-decoration"></div>
        
        <div class="main-card">
            <div class="logo-wrapper">
                <div class="logo-icon">
                    <i class="ri-store-3-line"></i>
                </div>
                <h1 class="brand-name">YussXy<span>Store</span></h1>
                <p class="brand-tag">Online Shop</p>
            </div>

            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="tab1">
                    <i class="ri-user-line"></i> Masuk
                </button>
                <button class="tab-btn" data-tab="tab2">
                    <i class="ri-user-add-line"></i> Daftar
                </button>
            </div>

            <!-- TAB 1: LOGIN -->
            <div class="tab-panel active" id="tab1">
                <div class="input-field">
                    <i class="ri-user-3-line"></i>
                    <input type="text" id="authUsername" placeholder="Username" autocomplete="off">
                </div>
                <div class="input-field">
                    <i class="ri-lock-password-line"></i>
                    <input type="password" id="authPassword" placeholder="Password">
                </div>
                <button id="authBtn" class="action-btn">
                    <i class="ri-login-box-line"></i> Masuk
                </button>
            </div>

            <!-- TAB 2: REGISTER -->
            <div class="tab-panel" id="tab2">
                <div class="input-field">
                    <i class="ri-user-3-line"></i>
                    <input type="text" id="regUsername" placeholder="Username" autocomplete="off">
                </div>
                <div class="input-field">
                    <i class="ri-smartphone-line"></i>
                    <input type="tel" id="regPhone" placeholder="Nomor WhatsApp">
                </div>
                <div class="input-field">
                    <i class="ri-lock-password-line"></i>
                    <input type="password" id="regPassword" placeholder="Password">
                </div>
                <div class="input-field">
                    <i class="ri-lock-password-line"></i>
                    <input type="password" id="regConfirmPassword" placeholder="Konfirmasi Password">
                </div>
                <button id="regBtn" class="action-btn">
                    <i class="ri-user-add-line"></i> Daftar
                </button>
            </div>

            <div id="messageBox" class="message-box"></div>

            <div class="footer-note">
                <i class="ri-shield-check-line"></i> Aman & Terpercaya
            </div>
        </div>
    </div>

    <script src="mm.js"></script>
</body>
</html>
